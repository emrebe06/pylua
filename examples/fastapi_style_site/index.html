<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ service }}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe6;
            --ink: #1f1a17;
            --accent: #d46a2e;
        }
        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: radial-gradient(circle at top right, #fff4df, var(--bg));
            color: var(--ink);
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        main {
            width: min(720px, calc(100vw - 32px));
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(31, 26, 23, 0.12);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(31, 26, 23, 0.12);
        }
        h1 {
            margin: 0 0 12px;
            font-size: clamp(2.2rem, 4vw, 4rem);
        }
        p {
            font-size: 1.05rem;
            line-height: 1.6;
        }
        strong {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <main>
        <h1>{{ service }}</h1>
        <p>Mode: <strong>{{ mode }}</strong></p>
        <p>Started at {{ now }}</p>
    </main>
</body>
</html>
